<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>登录 · 合力指数</title>
<link rel="stylesheet" href="style.css">
<style>
.login-hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--deep-blue) 0%, var(--deep-blue-mid) 100%);
  padding: 24px 16px;
  position: relative;
  overflow: hidden;
}
.login-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 40%, rgba(201,168,76,.08) 0%, transparent 60%);
}
.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow-lg);
  position: relative;
}
.login-card h1 {
  font-size: 22px;
  font-weight: 800;
  color: var(--deep-blue);
  margin-bottom: 4px;
  text-align: center;
}
.login-card > p {
  font-size: 13px;
  color: var(--text-light);
  text-align: center;
  margin-bottom: 24px;
}
.form-group { margin-bottom: 16px; }
.form-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
  display: block;
}
.form-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
  font-family: inherit;
  background: var(--bg-main);
}
.form-input:focus { border-color: var(--gold); }
.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  margin-bottom: 20px;
}
.form-options a { color: var(--gold); text-decoration: none; font-weight: 600; }
.form-options label { color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
.btn-login {
  width: 100%;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--deep-blue);
  border: none;
  padding: 12px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
}
.btn-login:hover { box-shadow: 0 4px 16px rgba(201,168,76,.35); }
.divider {
  text-align: center;
  font-size: 12px;
  color: var(--text-light);
  margin: 20px 0;
  position: relative;
}
.divider::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  width: 42%; height: 1px;
  background: var(--border);
}
.divider::after {
  content: '';
  position: absolute;
  right: 0; top: 50%;
  width: 42%; height: 1px;
  background: var(--border);
}
.btn-social {
  width: 100%;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  font-size: 14px;
  cursor: pointer;
  margin-bottom: 10px;
  transition: all .2s;
  font-family: inherit;
}
.btn-social:hover { border-color: var(--gold); }
.form-footer {
  text-align: center;
  font-size: 13px;
  color: var(--text-light);
  margin-top: 16px;
}
.form-footer a { color: var(--gold); text-decoration: none; font-weight: 700; }
.login-logo {
  text-align: center;
  margin-bottom: 20px;
}
</style>
</head>
<body>

<!-- 顶部标题栏 -->
<div class="topbar">
  <div class="topbar-left">
    <img src="logo.svg" alt="合力指数" class="topbar-logo" onerror="this.style.display='none';this.nextElementSibling.classList.add('active')"><span class="topbar-logo-fallback">合</span>
    <span class="topbar-title">合力指数</span>
  </div>
  <div class="topbar-right">
    <a href="register.html" class="topbar-btn topbar-btn-gold">注册</a>
  </div>
</div>

<!-- 登录表单 -->
<section class="login-hero">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.svg" alt="合力指数" style="width:48px;height:48px;" onerror="this.style.display='none'">
      <div style="font-size:18px;font-weight:800;color:var(--deep-blue);margin-top:8px;">合力指数</div>
    </div>
    <h1>登录您的账号</h1>
    <p>欢迎回来，继续参与共识构建</p>

    <form onsubmit="event.preventDefault(); alert('登录功能Demo，实际部署需接入后端')">
      <div class="form-group">
        <label class="form-label">手机号 / 邮箱</label>
        <input type="text" class="form-input" placeholder="请输入手机号或邮箱">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" placeholder="请输入密码">
      </div>
      <div class="form-options">
        <label style="display:flex;align-items:center;gap:4px;">
          <input type="checkbox"> 记住我
        </label>
        <a href="#">忘记密码？</a>
      </div>
      <button type="submit" class="btn-login">登录</button>
    </form>

    <div class="divider">或</div>

    <button class="btn-social" onclick="alert('Demo')">📱 微信登录</button>
    <button class="btn-social" onclick="alert('Demo')">📧 邮箱登录</button>

    <div class="form-footer">
      还没有账号？<a href="register.html">立即注册</a>
    </div>
  </div>
</section>

<script>
document.querySelectorAll('.topbar-logo').forEach(function(img) {
  img.addEventListener('error', function() {
    this.style.display = 'none';
    var fb = this.nextElementSibling;
    if (fb && fb.classList.contains('topbar-logo-fallback')) fb.classList.add('active');
  });
});
</script>
<script src="ai-widget.js"></script>
</body>
</html>
