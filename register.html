<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>注册 · 合力指数</title>
<link rel="stylesheet" href="style.css">
<style>
.register-hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--deep-blue) 0%, var(--deep-blue-mid) 100%);
  padding: 24px 16px;
  position: relative;
  overflow: hidden;
}
.register-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 40%, rgba(201,168,76,.08) 0%, transparent 60%);
}
.register-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow-lg);
  position: relative;
}
.register-card h1 {
  font-size: 22px;
  font-weight: 800;
  color: var(--deep-blue);
  margin-bottom: 4px;
  text-align: center;
}
.register-card > p {
  font-size: 13px;
  color: var(--text-light);
  text-align: center;
  margin-bottom: 24px;
}
.role-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}
.role-btn {
  border: 2px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  background: var(--bg-card);
  font-family: inherit;
  font-size: inherit;
  width: 100%;
}
.role-btn:hover { border-color: var(--gold); }
.role-btn.selected { border-color: var(--gold); background: var(--gold-bg); }
.role-icon { font-size: 22px; margin-bottom: 4px; }
.role-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.role-desc { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.form-group { margin-bottom: 16px; }
.form-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
  display: block;
}
.form-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
  font-family: inherit;
  background: var(--bg-main);
}
.form-input:focus { border-color: var(--gold); }
.form-hint { font-size: 11px; color: var(--text-light); margin-top: 4px; }
.btn-submit {
  width: 100%;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--deep-blue);
  border: none;
  padding: 12px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
  margin-top: 8px;
}
.btn-submit:hover { box-shadow: 0 4px 16px rgba(201,168,76,.35); }
.form-footer {
  text-align: center;
  font-size: 13px;
  color: var(--text-light);
  margin-top: 16px;
}
.form-footer a { color: var(--gold); text-decoration: none; font-weight: 700; }
</style>
</head>
<body>

<!-- 顶部标题栏 -->
<div class="topbar">
  <div class="topbar-left">
    <img src="logo.svg" alt="合力指数" class="topbar-logo" onerror="this.style.display='none';this.nextElementSibling.classList.add('active')"><span class="topbar-logo-fallback">合</span>
    <span class="topbar-title">合力指数</span>
  </div>
  <div class="topbar-right">
    <a href="login.html" class="topbar-btn">登录</a>
  </div>
</div>

<!-- 注册表单 -->
<section class="register-hero">
  <div class="register-card">
    <h1>注册合力指数</h1>
    <p>选择您的角色，加入新质生产力共识平台</p>

    <div class="role-grid">
      <button class="role-btn selected" onclick="selectRole(this)">
        <div class="role-icon">👤</div>
        <div class="role-name">C端投资者</div>
        <div class="role-desc">个人投资者</div>
      </button>
      <button class="role-btn" onclick="selectRole(this)">
        <div class="role-icon">🔬</div>
        <div class="role-name">专业投资者</div>
        <div class="role-desc">分析师/研究员</div>
      </button>
      <button class="role-btn" onclick="selectRole(this)">
        <div class="role-icon">🏢</div>
        <div class="role-name">上市公司</div>
        <div class="role-desc">IR/董秘</div>
      </button>
      <button class="role-btn" onclick="selectRole(this)">
        <div class="role-icon">🎓</div>
        <div class="role-name">产学研机构</div>
        <div class="role-desc">高校/智库</div>
      </button>
    </div>

    <form onsubmit="event.preventDefault(); alert('注册功能Demo，实际部署需接入后端')">
      <div class="form-group">
        <label class="form-label">手机号 / 邮箱</label>
        <input type="text" class="form-input" placeholder="请输入手机号或邮箱">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" placeholder="至少8位，含字母和数字">
      </div>
      <div class="form-group">
        <label class="form-label">昵称</label>
        <input type="text" class="form-input" placeholder="平台展示名称">
        <div class="form-hint">注册后可在个人主页修改</div>
      </div>
      <button type="submit" class="btn-submit">注册账号</button>
    </form>

    <div class="form-footer">
      已有账号？<a href="login.html">立即登录</a>
    </div>
  </div>
</section>

<script>
function selectRole(btn) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}
</script>
<script>
document.querySelectorAll('.topbar-logo').forEach(function(img) {
  img.addEventListener('error', function() {
    this.style.display = 'none';
    var fb = this.nextElementSibling;
    if (fb && fb.classList.contains('topbar-logo-fallback')) fb.classList.add('active');
  });
});
</script>
<script src="ai-widget.js"></script>
</body>
</html>
