<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 · 合力指数</title>
<style>
:root {
  --deep-blue: #0a1628;
  --blue-900: #0f2044;
  --consensus-gold: #c9a84c;
  --gold-light: #e8d48b;
  --white: #ffffff;
  --gray-50: #f9fafb;
  --gray-200: #e5e7eb;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Inter", "Noto Sans SC", system-ui, sans-serif; color: var(--gray-800); background: var(--gray-50); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
.nav { background: var(--deep-blue); }
.nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 20px; height: 56px; display: flex; align-items: center; gap: 20px; }
.nav-logo { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.nav-logo svg { width: 28px; height: 28px; }
.nav-logo span { color: var(--white); font-weight: 700; font-size: 15px; }

.main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
.register-card { background: var(--white); border-radius: 16px; padding: 36px; max-width: 480px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); border: 1px solid var(--gray-200); }
.register-card h1 { font-size: 24px; font-weight: 800; color: var(--deep-blue); margin-bottom: 6px; }
.register-card > p { font-size: 14px; color: var(--gray-500); margin-bottom: 24px; }

/* 角色选择 */
.role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.role-btn { border: 2px solid var(--gray-200); border-radius: 12px; padding: 16px 12px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--white); font-family: inherit; font-size: inherit; width: 100%; }
.role-btn:hover { border-color: var(--consensus-gold); }
.role-btn.selected { border-color: var(--consensus-gold); background: rgba(201,168,76,0.04); }
.role-icon { font-size: 24px; margin-bottom: 6px; }
.role-name { font-size: 13px; font-weight: 700; color: var(--gray-800); }
.role-desc { font-size: 11px; color: var(--gray-500); margin-top: 4px; }

/* 表单 */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 10px 14px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit; }
.form-input:focus { border-color: var(--consensus-gold); }
.form-hint { font-size: 11px; color: var(--gray-400); margin-top: 4px; }
.btn-submit { width: 100%; background: linear-gradient(135deg, var(--consensus-gold), var(--gold-light)); color: var(--deep-blue); border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; margin-top: 8px; }
.btn-submit:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201,168,76,0.3); }
.form-footer { text-align: center; font-size: 13px; color: var(--gray-500); margin-top: 16px; }
.form-footer a { color: var(--consensus-gold); text-decoration: none; font-weight: 600; }

.footer { background: var(--deep-blue); color: rgba(255,255,255,0.5); padding: 20px; text-align: center; font-size: 12px; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo" onclick="location.href='index.html'">
      <svg viewBox="0 0 100 100"><polygon points="50,2 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="none" stroke="#c9a84c" stroke-width="3"/><circle cx="50" cy="50" r="6" fill="#c9a84c"/></svg>
      <span>合力指数</span>
    </div>
  </div>
</nav>

<main class="main">
  <div class="register-card">
    <h1>注册合力指数</h1>
    <p>选择您的角色，加入新质生产力共识平台</p>

    <div class="role-grid">
      <button class="role-btn selected" onclick="selectRole(this)">
        <div class="role-icon">👤</div>
        <div class="role-name">C端投资者</div>
        <div class="role-desc">个人投资者</div>
      </button>
      <button class="role-btn" onclick="selectRole(this)">
        <div class="role-icon">🔬</div>
        <div class="role-name">专业投资者</div>
        <div class="role-desc">分析师/研究员</div>
      </button>
      <button class="role-btn" onclick="selectRole(this)">
        <div class="role-icon">🏢</div>
        <div class="role-name">上市公司</div>
        <div class="role-desc">IR/董秘</div>
      </button>
      <button class="role-btn" onclick="selectRole(this)">
        <div class="role-icon">🎓</div>
        <div class="role-name">产学研机构</div>
        <div class="role-desc">高校/智库</div>
      </button>
    </div>

    <form onsubmit="event.preventDefault(); alert('注册功能Demo，实际部署需接入后端')">
      <div class="form-group">
        <label class="form-label">手机号 / 邮箱</label>
        <input type="text" class="form-input" placeholder="请输入手机号或邮箱">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" placeholder="至少8位，含字母和数字">
      </div>
      <div class="form-group">
        <label class="form-label">昵称</label>
        <input type="text" class="form-input" placeholder="平台展示名称">
        <div class="form-hint">注册后可在个人主页修改</div>
      </div>
      <button type="submit" class="btn-submit">注册账号</button>
    </form>

    <div class="form-footer">
      已有账号？<a href="login.html">立即登录</a>
    </div>
  </div>
</main>

<footer class="footer">© 2026 合力指数 Heli-Index</footer>

<script>
function selectRole(btn) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}
</script>
</body>
</html>
