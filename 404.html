<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合力指数 - 页面重定向</title>
<script>
(function() {
  var path = window.location.pathname;
  path = path.replace(/\/$/, '');
  var parts = path.split('/');
  var page = parts[parts.length - 1];
  if (!page || page === '' || page === 'index.html' || page === 'Heli-index') {
    window.location.replace('/Heli-index/index.html');
  } else {
    // 尝试跳转到对应的实际HTML页面
    window.location.replace('/Heli-index/' + page + '.html');
  }
})();
</script>
<style>
body { font-family: "Noto Sans SC", sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #0a1628; color: #c9a84c; font-size: 16px; }
</style>
</head>
<body>页面重定向中，请稍候...</body>
</html>
